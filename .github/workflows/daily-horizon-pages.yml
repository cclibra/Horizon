  name: Daily Horizon Pages

  on:
    workflow_dispatch:
    schedule:
      - cron: "50 0 * * *"
    push:
      branches:
        - main
      paths:
        - ".github/workflows/daily-horizon-pages.yml"
        - "data/config.github.json"
        - "docs/**"

  permissions:
    contents: write

  concurrency:
    group: daily-horizon-pages
    cancel-in-progress: true

  jobs:
    daily-summary:
      runs-on: ubuntu-latest
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      steps:
        - name: Checkout
          uses: actions/checkout@v6

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.12"

        - name: Install uv
          uses: astral-sh/setup-uv@v3

        - name: Install dependencies
          run: uv sync

        - name: Prepare config
          run: cp data/config.github.json data/config.json

        - name: Run Horizon
          env:
            OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
            HORIZON_AI_BASE_URL: ${{ vars.HORIZON_AI_BASE_URL }}
            HORIZON_AI_MODEL_NAME: ${{ vars.HORIZON_AI_MODEL_NAME }}
            DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
            ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
            GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
            HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
          run: uv run horizon --hours 36

        - name: Verify generated posts
          run: |
            test -d docs/_posts
            find docs/_posts -maxdepth 1 -type f -name '*.md' -print
            test "$(find docs/_posts -maxdepth 1 -type f -name '*.md' | wc -l)" -gt 0

        - name: Sync posts for main branch Pages source
          run: |
            mkdir -p _posts
            cp docs/_posts/*.md _posts/
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _posts
            if ! git diff --cached --quiet; then
              git commit -m "Update Horizon summaries [skip ci]"
              git push
            fi

        - name: Set current date
          run: echo "DATE=$(date +'%Y-%m-%d')" >> "$GITHUB_ENV"

        - name: Deploy to GitHub Pages
          uses: peaceiris/actions-gh-pages@v4
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./docs
            publish_branch: gh-pages
            keep_files: true
            enable_jekyll: true
            commit_message: "Daily Horizon Summary: ${{ env.DATE }}"
