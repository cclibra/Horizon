  name: Daily Horizon Pages

  on:
    workflow_dispatch:
    schedule:
      - cron: "50 0 * * *"
    push:
      branches:
        - main
      paths:
        - ".github/workflows/daily-horizon-pages.yml"
        - "data/config.github.json"
        - "docs/**"

  permissions:
    contents: write

  concurrency:
    group: daily-horizon-pages
    cancel-in-progress: true

  jobs:
    daily-summary:
      runs-on: ubuntu-latest
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      steps:
        - name: Checkout
          uses: actions/checkout@v6

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.12"

        - name: Install uv
          uses: astral-sh/setup-uv@v3

        - name: Install dependencies
          run: uv sync

        - name: Prepare config
          run: cp data/config.github.json data/config.json

        - name: Check AI API configuration
          continue-on-error: true
          env:
            OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
            HORIZON_AI_BASE_URL: ${{ vars.HORIZON_AI_BASE_URL }}
            HORIZON_AI_MODEL_NAME: ${{ vars.HORIZON_AI_MODEL_NAME }}
          run: |
            python - <<'PY'
            import json
            import os
            import sys
            import urllib.error
            import urllib.request
            from urllib.parse import urlparse

            summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

            def add_summary(line: str) -> None:
                if summary_path:
                    with open(summary_path, "a", encoding="utf-8") as f:
                        f.write(line + "\n")

            def sanitize(text: str) -> str:
                return text.replace(api_key, "***") if api_key else text

            def warn(title: str, message: str) -> None:
                print(f"::warning title={title}::{sanitize(message)}")
                add_summary(f"- WARNING: {title}: {sanitize(message)}")

            add_summary("### AI API probe")

            api_key = os.environ.get("OPENAI_API_KEY", "").strip()
            base_url = os.environ.get("HORIZON_AI_BASE_URL", "").strip()
            model = os.environ.get("HORIZON_AI_MODEL_NAME", "").strip()

            missing = [
                name
                for name, value in (
                    ("OPENAI_API_KEY", api_key),
                    ("HORIZON_AI_BASE_URL", base_url),
                    ("HORIZON_AI_MODEL_NAME", model),
                )
                if not value
            ]
            if missing:
                for name in missing:
                    warn("Missing AI environment", f"{name} is empty")
                sys.exit(0)

            parsed = urlparse(base_url)
            if parsed.scheme not in ("http", "https") or not parsed.hostname:
                warn("Invalid AI base URL", "HORIZON_AI_BASE_URL must be an absolute HTTP(S) URL")
                sys.exit(0)

            endpoint = base_url.rstrip("/")
            if not endpoint.endswith("/chat/completions"):
                endpoint = f"{endpoint}/chat/completions"

            print(f"AI model: {model}")
            print(f"AI base URL host: {parsed.hostname}")
            print(f"AI probe endpoint path: {urlparse(endpoint).path}")
            add_summary(f"- Model: `{model}`")
            add_summary(f"- Base URL host: `{parsed.hostname}`")
            add_summary(f"- Probe endpoint path: `{urlparse(endpoint).path}`")

            def make_request(name: str, payload: dict) -> tuple[int | None, str]:
                add_summary("")
                add_summary(f"#### Probe: {name}")
                add_summary(f"- Payload keys: `{', '.join(payload.keys())}`")
                if "response_format" in payload:
                    add_summary("- response_format: `json_object`")
                if "temperature" in payload:
                    add_summary(f"- temperature: `{payload['temperature']}`")
                if "max_tokens" in payload:
                    add_summary(f"- max_tokens: `{payload['max_tokens']}`")

                req = urllib.request.Request(
                    endpoint,
                    data=json.dumps(payload).encode("utf-8"),
                    headers={
                        "Authorization": f"Bearer {api_key}",
                        "Content-Type": "application/json",
                        "User-Agent": "Horizon-Actions-AI-Probe/1.0",
                    },
                    method="POST",
                )

                try:
                    with urllib.request.urlopen(req, timeout=45) as resp:
                        body = resp.read().decode("utf-8", errors="replace")
                        status = resp.status
                except urllib.error.HTTPError as exc:
                    body = sanitize(exc.read().decode("utf-8", errors="replace"))
                    warn(f"AI API probe failed: {name}", f"HTTP {exc.code}")
                    print(f"[{name}] HTTP {exc.code}")
                    print(body[:1200])
                    add_summary(f"- Result: HTTP `{exc.code}`")
                    add_summary("- Response excerpt:")
                    add_summary("```")
                    add_summary(body[:1200])
                    add_summary("```")
                    return exc.code, body
                except Exception as exc:
                    warn(f"AI API probe failed: {name}", f"{type(exc).__name__}: {exc}")
                    print(f"[{name}] {type(exc).__name__}: {exc}")
                    add_summary(f"- Result: `{type(exc).__name__}: {sanitize(str(exc))}`")
                    return None, str(exc)

                safe_body = sanitize(body)
                print(f"[{name}] HTTP {status}")
                add_summary(f"- Result: HTTP `{status}`")

                try:
                    data = json.loads(body)
                    content = data["choices"][0]["message"]["content"]
                    add_summary(f"- Parsed choices[0].message.content: `{str(content)[:160]}`")
                except Exception as exc:
                    warn(f"AI API probe returned unexpected JSON: {name}", f"{type(exc).__name__}: {exc}")
                    print(safe_body[:1200])
                    add_summary("- Response excerpt:")
                    add_summary("```")
                    add_summary(safe_body[:1200])
                    add_summary("```")

                return status, body

            base_messages = [
                {"role": "system", "content": "You are a concise health check endpoint."},
                {"role": "user", "content": "Reply with exactly: ok"},
            ]
            json_messages = [
                {"role": "system", "content": "You are a JSON health check endpoint."},
                {"role": "user", "content": "Reply with a JSON object containing status=ok."},
            ]

            probes = [
                (
                    "minimal",
                    {
                        "model": model,
                        "messages": base_messages,
                        "max_tokens": 8,
                    },
                ),
                (
                    "json-mode",
                    {
                        "model": model,
                        "messages": json_messages,
                        "max_tokens": 8,
                        "response_format": {"type": "json_object"},
                    },
                ),
                (
                    "horizon-like",
                    {
                        "model": model,
                        "messages": json_messages,
                        "max_tokens": 8192,
                        "temperature": 0.3,
                        "response_format": {"type": "json_object"},
                    },
                ),
            ]

            results = []
            for name, payload in probes:
                status, _ = make_request(name, payload)
                results.append((name, status))

            summary = ", ".join(f"{name}={status}" for name, status in results)
            print(f"AI probe summary: {summary}")
            add_summary("")
            add_summary(f"- Probe summary: `{summary}`")
            PY

        - name: Run Horizon
          env:
            OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
            HORIZON_AI_BASE_URL: ${{ vars.HORIZON_AI_BASE_URL }}
            HORIZON_AI_MODEL_NAME: ${{ vars.HORIZON_AI_MODEL_NAME }}
            DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
            ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
            GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
            HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
          run: uv run horizon --hours 36

        - name: Verify generated posts
          run: |
            test -d docs/_posts
            find docs/_posts -maxdepth 1 -type f -name '*.md' -print
            test "$(find docs/_posts -maxdepth 1 -type f -name '*.md' | wc -l)" -gt 0

        - name: Sync posts for main branch Pages source
          run: |
            mkdir -p _posts
            cp docs/_posts/*.md _posts/
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _posts
            if ! git diff --cached --quiet; then
              git commit -m "Update Horizon summaries [skip ci]"
              git push
            fi

        - name: Set current date
          run: echo "DATE=$(date +'%Y-%m-%d')" >> "$GITHUB_ENV"

        - name: Deploy to GitHub Pages
          uses: peaceiris/actions-gh-pages@v4
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./docs
            publish_branch: gh-pages
            keep_files: true
            enable_jekyll: true
            commit_message: "Daily Horizon Summary: ${{ env.DATE }}"
