  name: Daily Horizon Pages

  on:
    workflow_dispatch:
    schedule:
      - cron: "50 0 * * *"
    push:
      branches:
        - main
      paths:
        - ".github/workflows/daily-horizon-pages.yml"
        - "data/config.github.json"
        - "docs/**"

  permissions:
    contents: write

  concurrency:
    group: daily-horizon-pages
    cancel-in-progress: true

  jobs:
    daily-summary:
      runs-on: ubuntu-latest
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      steps:
        - name: Checkout
          uses: actions/checkout@v6

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.12"

        - name: Install uv
          uses: astral-sh/setup-uv@v3

        - name: Install dependencies
          run: uv sync

        - name: Prepare config
          run: cp data/config.github.json data/config.json

        - name: Check AI API configuration
          continue-on-error: true
          env:
            OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
            HORIZON_AI_BASE_URL: ${{ vars.HORIZON_AI_BASE_URL }}
            HORIZON_AI_MODEL_NAME: ${{ vars.HORIZON_AI_MODEL_NAME }}
          run: |
            python - <<'PY'
            import json
            import os
            import sys
            import urllib.error
            import urllib.request
            from urllib.parse import urlparse

            summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

            def add_summary(line: str) -> None:
                if summary_path:
                    with open(summary_path, "a", encoding="utf-8") as f:
                        f.write(line + "\n")

            def warn(title: str, message: str) -> None:
                print(f"::warning title={title}::{message}")
                add_summary(f"- WARNING: {title}: {message}")

            add_summary("### AI API probe")

            api_key = os.environ.get("OPENAI_API_KEY", "").strip()
            base_url = os.environ.get("HORIZON_AI_BASE_URL", "").strip()
            model = os.environ.get("HORIZON_AI_MODEL_NAME", "").strip()

            missing = [
                name
                for name, value in (
                    ("OPENAI_API_KEY", api_key),
                    ("HORIZON_AI_BASE_URL", base_url),
                    ("HORIZON_AI_MODEL_NAME", model),
                )
                if not value
            ]
            if missing:
                for name in missing:
                    warn("Missing AI environment", f"{name} is empty")
                sys.exit(0)

            parsed = urlparse(base_url)
            if parsed.scheme not in ("http", "https") or not parsed.hostname:
                warn("Invalid AI base URL", "HORIZON_AI_BASE_URL must be an absolute HTTP(S) URL")
                sys.exit(0)

            endpoint = base_url.rstrip("/")
            if not endpoint.endswith("/chat/completions"):
                endpoint = f"{endpoint}/chat/completions"

            print(f"AI model: {model}")
            print(f"AI base URL host: {parsed.hostname}")
            print(f"AI probe endpoint path: {urlparse(endpoint).path}")
            add_summary(f"- Model: `{model}`")
            add_summary(f"- Base URL host: `{parsed.hostname}`")
            add_summary(f"- Probe endpoint path: `{urlparse(endpoint).path}`")

            payload = {
                "model": model,
                "messages": [
                    {"role": "system", "content": "You are a JSON health check endpoint."},
                    {"role": "user", "content": "Reply with a JSON object containing status=ok."},
                ],
                "max_tokens": 8,
                "response_format": {"type": "json_object"},
            }
            req = urllib.request.Request(
                endpoint,
                data=json.dumps(payload).encode("utf-8"),
                headers={
                    "Authorization": f"Bearer {api_key}",
                    "Content-Type": "application/json",
                },
                method="POST",
            )

            try:
                with urllib.request.urlopen(req, timeout=45) as resp:
                    body = resp.read().decode("utf-8", errors="replace")
                    status = resp.status
            except urllib.error.HTTPError as exc:
                body = exc.read().decode("utf-8", errors="replace").replace(api_key, "***")
                warn("AI API probe failed", f"HTTP {exc.code}")
                print(body[:1200])
                add_summary("")
                add_summary("Response excerpt:")
                add_summary("```")
                add_summary(body[:1200])
                add_summary("```")
                sys.exit(0)
            except Exception as exc:
                warn("AI API probe failed", f"{type(exc).__name__}: {exc}")
                sys.exit(0)

            if status < 200 or status >= 300:
                warn("AI API probe failed", f"HTTP {status}")
                print(body[:1200].replace(api_key, "***"))
                sys.exit(0)

            try:
                data = json.loads(body)
                content = data["choices"][0]["message"]["content"]
            except Exception as exc:
                warn("AI API probe returned unexpected JSON", f"{type(exc).__name__}: {exc}")
                print(body[:1200].replace(api_key, "***"))
                sys.exit(0)

            if not str(content).strip():
                warn("AI API probe returned empty content", "choices[0].message.content is empty")
                sys.exit(0)

            print("AI API probe succeeded.")
            add_summary("- Result: API probe succeeded.")
            PY

        - name: Run Horizon
          env:
            OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
            HORIZON_AI_BASE_URL: ${{ vars.HORIZON_AI_BASE_URL }}
            HORIZON_AI_MODEL_NAME: ${{ vars.HORIZON_AI_MODEL_NAME }}
            DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
            ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
            GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
            HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
          run: uv run horizon --hours 36

        - name: Verify generated posts
          run: |
            test -d docs/_posts
            find docs/_posts -maxdepth 1 -type f -name '*.md' -print
            test "$(find docs/_posts -maxdepth 1 -type f -name '*.md' | wc -l)" -gt 0

        - name: Sync posts for main branch Pages source
          run: |
            mkdir -p _posts
            cp docs/_posts/*.md _posts/
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _posts
            if ! git diff --cached --quiet; then
              git commit -m "Update Horizon summaries [skip ci]"
              git push
            fi

        - name: Set current date
          run: echo "DATE=$(date +'%Y-%m-%d')" >> "$GITHUB_ENV"

        - name: Deploy to GitHub Pages
          uses: peaceiris/actions-gh-pages@v4
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./docs
            publish_branch: gh-pages
            keep_files: true
            enable_jekyll: true
            commit_message: "Daily Horizon Summary: ${{ env.DATE }}"
